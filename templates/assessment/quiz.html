<!DOCTYPE html>
<html>
<head>
    <title>Quiz</title>
    <style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    margin:0;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.quiz-container{
    background: none;
    padding:0;
    width:100%;
    margin-top:30px;
    box-shadow: none;
}

h2{
    text-align:center;
    color:#00eaff;
}

#progress{
    text-align:center;
    margin:15px 0;
    font-weight:bold;
}

.question{
    margin-top:20px;
}

.question p{
    font-size:20px;
}





button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#00eaff;
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}
.quiz-title{
    text-align:center;
    margin-top:40px;
    color:#00eaff;
    font-size:32px;
    letter-spacing:1px;
}

/* OPTION CONTAINER */
.option{
    display:flex;
    align-items:center;
    gap:15px;
    background:#0f2430;
    padding:15px 20px;
    border-radius:12px;
    margin:12px auto;
    width:420px;
    cursor:pointer;
    transition:0.25s;
}

  .option{
    display:flex;
    align-items:center;
    gap:15px;
    background:#0f2430;
    padding:15px 20px;
    border-radius:12px;
    margin:12px auto;
    width:420px;
    cursor:pointer;
    transition:0.25s;
}

.option input{
    display:none;
}

.option:hover{
    background:#1e293b;
    transform:scale(1.03);
}

.option input:checked + .option-text{
    background:cyan;
    color:black;
    border-radius:12px;
    padding:15px 20px;
    display:block;
}

.option-text{
    width:100%;
}
back-btn{
    position:absolute;
    top:20px;
    left:20px;
    text-decoration:none;
    background:#00e5ff;
    color:black;
    padding:8px 14px;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:white;
}
input[type="radio"]:focus {
    outline: none;
}

.option:focus-within {
    background: #0f2430;
}
/* highlight ONLY when user selects */
.option input:checked + .option-text {
    background: cyan;
    color: black;
    border-radius: 12px;
    padding: 15px 20px;
    display: block;
}

/* make text take full width */
.option-text{
    width:100%;
    display:block;
}
nav-buttons{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:20px;
}

#prevBtn{
    background:#4585de;
}

#prevBtn:hover{
    background:#3b5c89;
}

</style>
</head>

<body>

<div class="quiz-container"></div>
<h1 class="quiz-title">{{ topic }} - {{ level }} Assessment</h2>
<p id="progress">Total Questions: {{ questions|length}}</p>
<h3 id="progress"></h3>

<form method="POST" action="{{ url_for('assessment.submit', topic=topic, level=level) }}">

{% for q in questions %}
<div class="question" style="display:none;">

<p><strong>{{ loop.index }}. {{ q[3] }}</strong></p>

<label class="option">
    <input type="radio" name="q{{ q[0] }}" value="A">
    <span class="option-text">{{ q[4] }}</span>
</label>

<label class="option">
    <input type="radio" name="q{{ q[0] }}" value="B">
    <span class="option-text">{{ q[5] }}</span>
</label>

<label class="option">
    <input type="radio" name="q{{ q[0] }}" value="C">
    <span class="option-text">{{ q[6] }}</span>
</label>

<label class="option">
    <input type="radio" name="q{{ q[0] }}" value="D">
    <span class="option-text">{{ q[7] }}</span>
</label>

</div>

{% endfor %}
<button type="button" onclick="prevQuestion()" id="prevBtn">
    ◀ Back
</button>
<button type="button" onclick="nextQuestion()" id="nextBtn">
Next ▶
</button>

<button type="submit" id="submitBtn" style="display:none;">
Submit Quiz
</button>

</form>
<script>

let current = 0;
const questions = document.querySelectorAll(".question");
const progress = document.getElementById("progress");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const submitBtn = document.getElementById("submitBtn");

function showQuestion(index){

    // hide all questions
    questions.forEach(q => q.style.display = "none");

    // show current question
    questions[index].style.display = "block";

    // ✅ remove browser focus only (DO NOT uncheck)
    questions[index]
        .querySelectorAll("input[type='radio']")
        .forEach(r => r.blur());

    // update progress text
    progress.innerText =
        "Question " + (index + 1) + " / " + questions.length;

    // buttons control
    if(index === questions.length - 1){
        nextBtn.style.display = "none";
        submitBtn.style.display = "inline-block";
    } else {
        nextBtn.style.display = "inline-block";
        submitBtn.style.display = "none";
    }
}

function nextQuestion(){

    const selected =
        questions[current].querySelector("input:checked");

    if(!selected){
        alert("Please select an answer!");
        return;
    }

    current++;
    showQuestion(current);
}

showQuestion(current);
function prevQuestion(){

    if(current > 0){
        current--;
        showQuestion(current);
    }
}

</script>
</body>
</html>
