<!DOCTYPE html>
<html>
<head>
    <title>Cryptora Assessment</title>
    <style>
        body {
            background: #0f172a;
            font-family: Arial;
            color: white;
            text-align: center;
            padding-top: 80px;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 12px 20px;
            margin: 8px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0ea5e9;
        }

        a {
            text-decoration: none;
        }

.modules{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(260px,1fr));
    gap:25px;
    margin-top:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 15px rgba(0,255,255,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px cyan;
}

.card h3{
    color:#00eaff;
}

.card p{
    font-size:14px;
    color:#ddd;
}

.start-btn{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:linear-gradient(45deg,#00eaff,#0077ff);
    color:white;
    cursor:pointer;
    font-weight:bold;
}

.start-btn:hover{
    opacity:0.85;
}
.topics-container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 25px;
    max-width: 1000px;
    margin: auto;
    margin-top: 40px;
}

.topic-card {
    background: #0f172a;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 15px rgba(0,255,255,0.2);
    transition: 0.3s;
}

.topic-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 25px cyan;
}

.start-btn {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    background: cyan;
    color: black;
    font-weight: bold;
    cursor: pointer;
}
.back-btn{
    position:absolute;
    top:20px;
    left:20px;
    text-decoration:none;
    background:#00e5ff;
    color:black;
    padding:8px 14px;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.back-btn:hover{
    background:white;
}

    </style>
</head>

<body>

<h1>Welcome to Cryptora Assessment</h1>

<h2>Select a Topic</h2>

{% set topics = [
"Networking",
"Ethical Hacking",
"Linux",
"Cryptography",
"OS & Security",
"Cybersecurity Concepts"
] %}

<div class="topics-container">

{% for topic in topics %}
    <div class="topic-card">

        <h3>📝 {{ topic }}</h3>

        <a href="{{ url_for('assessment.levels', topic=topic) }}">
            <button class="start-btn">Start Assessment</button>
        </a>

    </div>
{% endfor %}

</div>
<br>
<a href="{{ url_for('assessment.dashboard') }}">
    <button>📊 View Progress Dashboard</button>
</a>
</body>
</html>
