<!DOCTYPE html>
<html>
<head>
    <title>Progress Dashboard</title>
    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 60%;
            background-color: #1e293b;
        }

        th, td {
            padding: 12px;
            border: 1px solid #334155;
        }

        th {
            background-color: #2563eb;
        }

        tr:hover {
            background-color: #334155;
        }

        a {
            color: #38bdf8;
        }
    </style>
</head>
<body>

<h2>📊 Your Quiz Progress</h2>

<table>
    <tr>
        <th>Topic</th>
        <th>Score</th>
        <th>Total</th>
        <th>Status</th>
    </tr>

    {% for row in results %}
    <tr>
        <td>{{ row[0] }}</td>
        <td>{{ row[1] }}</td>
        <td>{{ row[2] }}</td>
        <td>{{ row[3] }}</td>
    </tr>
    {% endfor %}
</table>
<a href="/dashboard">⬅ Go Back Home</a>
<br><br>

</body>
</html>
